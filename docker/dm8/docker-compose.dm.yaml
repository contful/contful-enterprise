# Contful Enterprise — 达梦数据库 (DM8) 部署配置
# 用法: docker compose -f docker/dm8/docker-compose.dm.yaml --env-file .env.dm up -d

version: "3.8"

services:
  dm8:
    image: registry.cn-hangzhou.aliyuncs.com/contful/dm8:v8.1.3.140
    container_name: contful-dm8
    privileged: true
    environment:
      PAGE_SIZE: 16
      CASE_SENSITIVE: 0  # 0=不区分大小写, 兼容 PostgreSQL 习惯
      CHARSET: 1          # UTF-8
      DB_NAME: contful_ent
      INSTANCE_NAME: CONTFUL
    ports:
      - "5236:5236"
    volumes:
      - dm8_data:/opt/dmdbms/data
      - ./dm8/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/dmdbms/bin/disql", "SYSDBA/SYSDBA001@localhost:5236", "-e", "select 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dm8_data:
