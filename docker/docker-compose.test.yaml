# Contful Docker 测试配置（使用备用端口避免冲突）

services:
  admin:
    image: contful/console:test
    container_name: contful-console-test
    ports:
      - "8090:80"   # Console 测试端口
    env_file: .env
    environment:
      - SERVER_PORT=9080
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  api:
    image: contful/api:test
    container_name: contful-api-test
    ports:
      - "9090:8080"  # Open API 测试端口
    env_file: .env
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
