# =============================================================================
# Contful Docker 编排配置
# =============================================================================
#
# 前置条件:
#   1. 将 sql/init.sql 导入到 PostgreSQL
#   2. cp .env.example .env，填入数据库/Valkey/JWT 信息
#   3. 已构建镜像:
#      docker build -t contful/admin:alpine -f docker/Dockerfile.admin ..
#      docker build -t contful/open:alpine -f docker/Dockerfile.open ..
#
# 启动:
#   docker-compose up -d
#
# 访问:
#   - 管理后台: http://localhost            (OpenResty → Console SPA + /admin/ 代理)
#   - Open API: http://localhost:8080/api/v1/
#
# 水平扩展 Open API:
#   docker-compose up -d --scale open=3
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Admin 服务（Console SPA + Admin API，OpenResty 对外 :80 :443）
  # ---------------------------------------------------------------------------
  admin:
    image: contful/admin:alpine
    container_name: contful-admin
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - contful-uploads:/app/uploads

  # ---------------------------------------------------------------------------
  # Open API 服务（无状态，可水平扩展）
  # ---------------------------------------------------------------------------
  open:
    image: contful/open:alpine
    container_name: contful-open
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - contful-uploads:/app/uploads

volumes:
  contful-uploads:
