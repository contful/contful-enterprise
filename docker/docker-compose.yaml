# =============================================================================
# Contful Docker 编排配置
# =============================================================================
#
# 前置条件:
#   1. 将 sql/init_pg.sql 导入到 PostgreSQL
#   2. cp .env.example .env，填入数据库/Redis/JWT 信息
#   3. 已构建镜像:
#      docker build -t contful/console:alpine -f Dockerfile.console ..
#      docker build -t contful/api:alpine -f Dockerfile.api ..
#
# 启动:
#   docker-compose --env-file .env up -d
#
# 访问:
#   - 管理后台: http://localhost            (OpenResty → Console SPA + /admin/ 代理)
#   - Open API: http://localhost:8080/      (直连)
#
# 水平扩展 Open API:
#   docker-compose --env-file .env up -d --scale api=3
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Admin 服务（Console SPA + Admin API，OpenResty 对外 :80 :443）
  # 容器内 Admin API 监听 9080，由 nginx 反向代理
  # ---------------------------------------------------------------------------
  admin:
    image: contful/console:alpine
    container_name: contful-console
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    environment:
      - SERVER_PORT=9080
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - contful-uploads:/app/uploads

  # ---------------------------------------------------------------------------
  # Open API 服务（无状态，可水平扩展）
  # 容器内监听 8080，宿主机映射 8080
  # ---------------------------------------------------------------------------
  api:
    image: contful/api:alpine
    container_name: contful-api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - SERVER_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - contful-uploads:/app/uploads

volumes:
  contful-uploads:
