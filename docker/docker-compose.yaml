# =============================================================================
# Contful Docker 编排配置
# =============================================================================
#
# 快速启动:
#   1. 构建镜像（从项目根目录）：
#      ./shell/build-image.sh
#      # 或指定数据库类型：
#      DB_TYPE=dm ./shell/build-image.sh
#
#   2. 复制配置模板：
#      cp docker/conf/config.yml.console.example docker/conf/config.yml
#      cp docker/conf/config.yml.open.example docker/conf/config.yml
#   3. 编辑配置文件，修改密码等敏感信息
#   4. 启动服务：
#      docker-compose up -d
#
# 访问:
#   - 管理后台: http://localhost            (OpenResty → Console SPA + /admin/ 代理)
#   - Open API:  http://localhost:8080/    (直连)
#
# 镜像说明:
#   - contful/console:pg-latest   # Admin API + Console SPA（PostgreSQL 版本）
#   - contful/openapi:pg-latest   # Open API 服务（PostgreSQL 版本）
#
# 水平扩展 Open API:
#   docker-compose up -d --scale openapi=3
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Console 服务（Console SPA + Admin API，OpenResty 对外 :80 :443）
  # ---------------------------------------------------------------------------
  console:
    build:
      context: ..
      dockerfile: docker/Dockerfile.console
    volumes:
      - ./conf/config.yml:/app/config.yml:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"

  # ---------------------------------------------------------------------------
  # Open API 服务（无状态，可水平扩展）
  # ---------------------------------------------------------------------------
  openapi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.openapi
    volumes:
      - ./conf/config.yml:/app/config.yml:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    ports:
      - "8080:8080"

