# =============================================================================
# Contful Docker 编排配置
# =============================================================================
#
# 快速启动:
#   1. 在 contful/ 目录编辑配置文件：
#      - conf/console.yaml   # Console 服务配置
#      - conf/openapi.yaml  # Open API 服务配置
#   2. 启动服务：
#      docker-compose -f docker/docker-compose.yaml up -d
#
# 访问:
#   - 管理后台: http://localhost     (Console SPA + Admin API)
#   - Open API:  http://localhost:8080
#
# 日志查看:
#   docker logs -f contful-console
#   docker exec contful-console cat /app/logs/admin-api.log
#   docker exec contful-console cat /app/logs/access.log
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Console 服务（Console SPA + Admin API，OpenResty 对外 :80 :443）
  # ---------------------------------------------------------------------------
  console:
    image: contful/console:pg-amd64-latest
    volumes:
      - ../conf/console.yaml:/app/config.yml:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "9080:9080"

  # ---------------------------------------------------------------------------
  # Open API 服务（无状态，可水平扩展）
  # ---------------------------------------------------------------------------
  openapi:
    image: contful/openapi:pg-amd64-latest
    volumes:
      - ../conf/openapi.yaml:/app/config.yml:ro
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    ports:
      - "8080:8080"

