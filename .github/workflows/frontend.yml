name: Frontend CI

on:
  push:
    paths: ['console/**']
  pull_request:
    paths: ['console/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install
        run: yarn install --frozen-lockfile
        working-directory: console

      - name: Type check
        run: npx vue-tsc --noEmit
        working-directory: console

      - name: Build
        run: yarn build
        working-directory: console
