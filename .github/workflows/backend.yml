name: Backend CI

on:
  push:
    branches: [main, dev]
    paths: ['admin/**', 'openapi/**']
  pull_request:
    paths: ['admin/**', 'openapi/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Admin API
        run: cd admin && go build -tags=pg ./...

      - name: Build Open API
        run: cd openapi && go build -tags=pg ./...

      - name: Vet
        run: cd admin && go vet ./... && cd ../openapi && go vet ./...

      - name: Test
        run: cd admin && go test -v -race ./... && cd ../openapi && go test -v -race ./...
