# Contful Admin API 配置
# 文档: https://docs.contful.dev/admin-api/configuration

# 服务配置
server:
  port: "8080"           # 服务端口
  mode: "release"        # 运行模式: release/debug
  read_timeout: 60       # 读超时(秒)
  write_timeout: 60       # 写超时(秒)
  shutdown_timeout: 30   # 优雅关闭超时(秒)

# 数据库配置 (PostgreSQL)
database:
  host: "localhost"
  port: 5432
  user: "contful"
  password: ""            # 推荐使用环境变量或 secrets
  name: "contful"
  ssl_mode: "disable"    # disable/require/verify-ca/verify-full
  max_open_conns: 100    # 最大连接数
  max_idle_conns: 10     # 空闲连接数
  conn_max_lifetime: 3600 # 连接最大存活时间(秒)

# Redis 配置
redis:
  host: "localhost"
  port: 6379
  password: ""            # 推荐使用环境变量
  db: 0                   # 数据库编号
  pool_size: 100         # 连接池大小

# JWT 认证配置
jwt:
  secret: ""              # ⚠️ 必填！使用随机字符串，建议 32+ 字符
  access_token_expire_minutes: 15    # Access Token 过期时间
  refresh_token_expire_days: 7       # Refresh Token 过期时间

# 文件存储配置
storage:
  upload_dir: "./uploads" # 上传文件存储目录
  max_upload_size_mb: 10  # 最大上传文件大小(MB)
  allowed_extensions:     # 允许的文件扩展名
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"

# CORS 跨域配置
cors:
  allowed_origins:
    - "http://localhost:5173"  # 开发环境
    - "http://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Requested-With"
  allow_credentials: true
  max_age: 86400          # 预检请求缓存时间(秒)

# 日志配置
logging:
  level: "info"           # debug/info/warn/error
  format: "json"          # json/console
  output: "stdout"        # stdout/stderr 或文件路径

# 审计日志配置
audit:
  enabled: true
  log_all_requests: false # 是否记录所有请求，默认只记录写操作

# 多站点配置 (可选，留空为单站点模式)
multi_site:
  enabled: false
  default_site_id: ""     # 默认站点 ID

# 特性开关
features:
  version_history: true   # 内容版本历史
  api_tokens: true        # API Token 管理
  media_library: true      # 媒体库
