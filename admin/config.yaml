# Contful Admin API 配置
# 敏感信息（密码、密钥）通过 .env 文件配置
# 环境变量可覆盖配置，格式：CONTFUL_xxx

# 服务配置
server:
  port: "9080"
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库（敏感信息在 .env 中配置）
database:
  host: localhost
  port: 5432
  user: postgres
  password: ""           # 从 .env 读取
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# Redis（密码在 .env 中配置）
redis:
  host: localhost
  port: 6379
  password: ""           # 从 .env 读取
  db: 0
  pool_size: 100

# JWT 认证（密钥在 .env 中配置）
# jwt.secret: JWT 签名密钥，建议 32+ 字符
# 生成方式: openssl rand -base64 32 | tr -d '=\n' | tr '/+' '_-'
jwt:
  secret: "AYSr6OkSoo0Pnj-oOznbBKqX6XEdRoPzR72HrUW2blw"  # 示例密钥，请替换
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

# 安全配置
# security.api_token_key: API Token 加密密钥（AES-256-GCM）
#   - 支持任意长度字符串（会自动派生 32 字节密钥）
#   - 推荐使用 64 字符 hex（纯 0-9a-f）：openssl rand -hex 32
# ⚠️ 警告：变更此密钥将导致所有现有 API Token 无法解密，Open API 认证会失败！
#    如需变更，请先导出所有 Token，修改配置后重新生成 Token。
security:
  api_token_key: "0a8c6ca988b54e63c95fa34588f3bfcad1e08deca16a66001a8f8ef0977b1d8d"  # 示例密钥，请替换

# 文件存储
storage:
  upload_dir: ./uploads
  max_upload_size_mb: 10

# CORS 跨域配置
cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:5173
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  allow_credentials: true
  max_age: 86400

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# 审计日志
audit:
  enabled: true
  log_all_requests: false

# 多站点配置
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
