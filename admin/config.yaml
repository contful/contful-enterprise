# Contful Admin API 配置
# 敏感信息（密码、密钥）通过 .env 文件配置
# 环境变量可覆盖配置，格式：CONTFUL_xxx

# 服务配置
server:
  port: "8080"
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库（敏感信息在 .env 中配置）
database:
  host: localhost
  port: 5432
  user: postgres
  password: ""           # 从 .env 读取
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# Redis（密码在 .env 中配置）
redis:
  host: localhost
  port: 6379
  password: ""           # 从 .env 读取
  db: 0
  pool_size: 100

# JWT 认证（密钥在 .env 中配置）
jwt:
  secret: ""             # 必填，从 .env 读取
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

# 文件存储
storage:
  upload_dir: ./uploads
  max_upload_size_mb: 10

# CORS 跨域配置
cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:5173
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  allow_credentials: true
  max_age: 86400

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# 审计日志
audit:
  enabled: true
  log_all_requests: false

# 多站点配置
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
