# Contful Admin API 配置
# 敏感信息（密码、密钥）通过 .env 文件配置
# 环境变量可覆盖配置，格式：CONTFUL_xxx

# 服务配置
server:
  port: "9080"
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库（敏感信息在 .env 中配置）
database:
  host: localhost
  port: 5432
  user: postgres
  password: ""           # 从 .env 读取
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# Redis（密码在 .env 中配置）
redis:
  host: localhost
  port: 6379
  password: ""           # 从 .env 读取
  db: 0
  pool_size: 100

# JWT 认证（密钥在 .env 中配置）
# jwt.secret: JWT 签名密钥（留空则从 security.secret 自动派生）
# 生成方式: openssl rand -base64 32 | tr -d '=\n' | tr '/+' '_-'
jwt:
  secret: ""  # 留空，从 security.secret 自动派生
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

# 安全配置（统一密钥）
# security.secret: 主密钥，用于 JWT 签名和数据加密
#   - 支持 64 字符 hex（纯 0-9a-f）：openssl rand -hex 32
#   - 支持任意长度字符串（会自动派生 32 字节密钥）
# security.algorithm: 加密算法（默认 aes-256-gcm）
#   - aes-256-gcm: AES-256-GCM（推荐）
#   - sm4-gcm: 国密 SM4-GCM（需国密支持）
# ⚠️ 重要：此密钥用于加密存储敏感数据，变更前请确保无遗留加密数据
security:
  secret: "0a8c6ca988b54e63c95fa34588f3bfcad1e08deca16a66001a8f8ef0977b1d8d"  # 示例密钥，请替换
  algorithm: "aes-256-gcm"

# 文件存储
storage:
  upload_dir: ./uploads
  max_upload_size_mb: 10

# CORS 跨域配置
cors:
  allowed_origins:
    - http://localhost:3000
    - http://localhost:5173
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Requested-With
  allow_credentials: true
  max_age: 86400

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# 审计日志
audit:
  enabled: true
  log_all_requests: false

# 多站点配置
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
