# =============================================================================
# Contful Admin Console 配置
# 职责:
#   - :80  Console SPA + Admin API 代理
#   - 前端请求 /admin/api/* 代理到内部 9080
# =============================================================================

worker_processes auto;
error_log /app/logs/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /app/logs/access.log main;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Admin API 反向代理
    upstream admin_api {
        server 127.0.0.1:9080;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 上传文件访问
        location /uploads/ {
            alias /app/uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Admin API 代理（前端通过 /admin/api/v1/... 访问）
        # 与 vite.config.ts proxy 配置对应：/admin/api -> 后端 /v1/
        location /admin/api/ {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }

        # 健康检查
        location /health {
            access_log off;
            proxy_pass http://admin_api/health;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
