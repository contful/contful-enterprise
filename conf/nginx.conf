# =============================================================================
# Contful Admin Console Nginx Configuration
# 高性能优化配置
# =============================================================================

# Worker processes - 自动检测 CPU 核心数
worker_processes auto;

# 错误日志
error_log /app/logs/error.log warn;
pid /app/logs/nginx.pid;

# 事件模块 - 连接优化
events {
    worker_connections 4096;      # 提升并发连接数（默认 1024）
    use epoll;                     # Linux 高性能事件模型
    multi_accept on;               # 一次接受多个连接
}

# 文件描述符限制
worker_rlimit_nofile 65535;

http {
    # 基础配置
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    
    # 字符集
    charset utf-8;
    
    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # 日志优化（生产环境可关闭 access log 提升性能）
    access_log off;
    error_log /app/logs/error.log warn;
    
    # =========================================================================
    # 性能优化核心配置
    # =========================================================================
    
    # 零拷贝传输
    sendfile on;
    tcp_nopush on;                    # 优化数据包发送
    tcp_nodelay on;                   # 禁用 Nagle 算法，减少延迟
    
    # Keep-Alive 优化
    keepalive_timeout 30;             # 降低超时时间（默认 65s）
    keepalive_requests 1000;          # 单连接最大请求数
    
    # 文件描述符缓存
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # Hash 表优化
    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;
    
    # 隐藏 Nginx 版本
    server_tokens off;
    
    # =========================================================================
    # Gzip 压缩优化
    # =========================================================================
    gzip on;
    gzip_vary on;                     # 兼容老版本代理缓存
    gzip_proxied any;                  # 为所有代理请求启用压缩
    gzip_min_length 1024;             # 小于 1KB 不压缩
    gzip_comp_level 6;                 # 压缩级别（1-9，6 为平衡点）
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        application/x-javascript
        image/svg+xml
        application/xml+rss;
    gzip_disable "msie6";            # 禁用 IE6 压缩
    
    # =========================================================================
    # 限流配置（可选，按需启用）
    # =========================================================================
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
    
    # =========================================================================
    # 上游服务器配置
    # =========================================================================
    upstream admin_api {
        server 127.0.0.1:9080;
        keepalive 32;                  # 保持到后端的空闲连接数
    }
    
    # =========================================================================
    # 虚拟主机配置
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # SSL 重定向（可选，设置 SSL_CERT_PATH + SSL_KEY_PATH 后自动启用 443）
        set $ssl_redirect 0;
        # 如果证书文件存在，启用 SSL 重定向
        # if (-f /app/conf/fullchain.pem) { set $ssl_redirect 1; }
        
        # 根目录和索引
        root /usr/share/nginx/html;
        index index.html;
        
        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        
        # 客户端上传限制
        client_max_body_size 10m;
        client_body_buffer_size 128k;
        
        # =====================================================================
        # 静态资源：上传文件
        # =====================================================================
        location /uploads/ {
            alias /app/uploads/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;                 # 静态资源不记录访问日志
        }
        
        # =====================================================================
        # Admin API 反向代理（高性能配置）
        # =====================================================================
        location /admin/api/ {
            proxy_pass http://admin_api;
            proxy_http_version 1.1;
            
            # 启用 Keep-Alive 到后端
            proxy_set_header Connection "";
            
            # 请求头传递
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # 超时优化
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            
            # 缓冲区优化
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 32k;
            
            # 禁用代理缓存（API 需要实时数据）
            proxy_cache off;
            
            # 限流（可选，按需启用）
            # limit_req zone=api burst=20 nodelay;
        }
        
        # =====================================================================
        # 健康检查
        # =====================================================================
        location /health {
            access_log off;
            proxy_pass http://admin_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # =====================================================================
        # SPA 路由回退
        # =====================================================================
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }

    # =========================================================================
    # SSL/TLS 配置（将 fullchain.pem + privkey.pem 放到 conf/ 目录即可启用）
    # =========================================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate     /app/conf/ssl/fullchain.pem;
    #     ssl_certificate_key /app/conf/ssl/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #
    #     root /usr/share/nginx/html;
    #     index index.html;
    #     client_max_body_size 10m;
    #
    #     location /uploads/ {
    #         alias /app/uploads/;
    #         expires 1y;
    #         add_header Cache-Control "public, immutable";
    #     }
    #
    #     location /admin/api/ {
    #         proxy_pass http://admin_api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    #
    #     location /health {
    #         proxy_pass http://admin_api/health;
    #     }
    #
    #     location / {
    #         try_files $uri $uri/ /index.html;
    #     }
    # }
}
