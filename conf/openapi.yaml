# Contful Open API 配置
# 敏感信息（密码、密钥）通过 .env 文件配置
# 环境变量可覆盖配置，格式：CONTFUL_OPEN_xxx

# 服务配置
server:
  port: "8080"
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库
database:
  host: postgres
  port: 5432
  user: postgres
  password: ""  # Set via DB_PASSWORD env var
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# 安全配置（需与 console.yaml 保持一致，用于数据加密）
security:
  secret: ef3594a7274376527e4a31fc99341a27e372e7e7f3295c796684ef6a0149afea
  algorithm: aes-256-gcm

# Redis
redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# 文件存储
storage:
  upload_dir: ./uploads
  max_upload_size_mb: 10

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# 审计日志
audit:
  enabled: true
  log_all_requests: false

# 多站点配置
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
