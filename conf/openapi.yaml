# Contful Open API 配置
# 敏感信息（密码、密钥）通过 .env 文件配置
# 环境变量可覆盖配置，格式：CONTFUL_OPEN_xxx

# 服务配置
server:
  port: "8080"
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库
database:
  host: postgres
  port: 5432
  user: postgres
  password: ""  # Set via DB_PASSWORD env var
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# 安全配置
security:
  secret: f717305460370e37991e5615e54561ed7f28a190bef24e69304f85f87e784d16
  algorithm: aes-256-gcm

# Redis
redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# 文件存储
storage:
  upload_dir: ./uploads
  max_upload_size_mb: 10

# 日志配置
logging:
  level: info
  format: json
  output: stdout

# CORS 配置
cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed_headers:
    - "*"
  allow_credentials: true
  max_age: 86400

# 审计日志
audit:
  enabled: true
  log_all_requests: false

# 多站点配置
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
