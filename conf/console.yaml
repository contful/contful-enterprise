# JWT 配置（Admin 登录鉴权，从 security.secret 自动派生）
jwt:
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

# 文件存储配置
storage:
  driver: local           # local / s3 / oss / cos / obs / minio
  upload_dir: ./uploads
  max_upload_size_mb: 10
  base_url: /uploads
  allowed_extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
  # 云存储凭证（切换 driver 时取消注释）
  # oss:
  #   bucket: your-bucket
  #   endpoint: oss-cn-hangzhou.aliyuncs.com
  #   access_key: your-access-key
  #   secret_key: your-secret-key
  # s3:
  #   bucket: your-bucket
  #   endpoint: s3.amazonaws.com
  #   region: us-east-1
  # cos:
  #   bucket: your-bucket-1250000000
  #   region: ap-guangzhou
  # obs:
  #   bucket: your-bucket
  #   endpoint: obs.myhwclouds.com

# 日志配置
logging:
  level: info             # debug / info / warn / error
  format: json            # json / text
  output: stdout          # stdout / stderr / 文件路径

# 审计日志（记录管理操作）
audit:
  enabled: true
  log_all_requests: false

# 多站点配置（SaaS 多租户）
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
