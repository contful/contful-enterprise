# =============================================================================
# Contful Console (Admin API) 配置
# 服务: admin-api (JWT 认证, 管理后台 API)
# =============================================================================
#
# 配置优先级:
#   1. 环境变量（DB_HOST 等，见 readEnvOverrides）
#   2. 本文件中的值
#   3. Go 代码中的内置默认值
#
# 使用说明:
#   镜像内置此文件为 /app/config.yml
#   运行时可通过挂载 /app/config.yml 覆盖
#   或通过环境变量覆盖单个配置项
#
# =============================================================================

# 服务配置
server:
  port: 9080
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库配置
database:
  type: postgres          # postgres（默认）
  host: postgres
  port: 5432
  user: postgres
  password: CHANGE_ME
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# Redis 配置（用于缓存、会话、限流）
redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 100

