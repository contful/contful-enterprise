# =============================================================================
# Contful Console (Admin API) 配置
# 服务: admin-api (JWT 认证, 管理后台 API)
# =============================================================================
#
# 配置优先级:
#   1. 环境变量（DB_HOST 等，见 readEnvOverrides）
#   2. 本文件中的值
#   3. Go 代码中的内置默认值
#
# 使用说明:
#   镜像内置此文件为 /app/config.yml
#   运行时可通过挂载 /app/config.yml 覆盖
#   或通过环境变量覆盖单个配置项
#
# =============================================================================

# 服务配置
server:
  port: 9080
  mode: release
  read_timeout: 60
  write_timeout: 60
  shutdown_timeout: 30

# 数据库配置
database:
  type: postgres          # postgres（默认）/ dm（达梦 DM8）
  host: postgres
  port: 5432
  user: postgres
  password: CHANGE_ME
  name: contful
  ssl_mode: disable
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

# Redis 配置（用于缓存、会话、限流）
redis:
  host: redis
  port: 6379
  password: ""
  db: 0
  pool_size: 100

# 安全配置（生成密钥: openssl rand -hex 32）
# 用于加密存储的敏感字段（API Token、Webhook 密钥等）
security:
  secret: ef3594a7274376527e4a31fc99341a27e372e7e7f3295c796684ef6a0149afea
  algorithm: aes-256-gcm  # aes-256-gcm（默认）/ sm4-gcm（国密）

# JWT 配置（Admin 登录鉴权，从 security.secret 自动派生）
jwt:
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7

# 文件存储配置
storage:
  driver: local           # local / s3 / oss / cos / obs / minio
  upload_dir: ./uploads
  max_upload_size_mb: 10
  base_url: /uploads
  allowed_extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .pdf
    - .doc
    - .docx
    - .xls
    - .xlsx
  # 云存储凭证（切换 driver 时取消注释）
  # oss:
  #   bucket: your-bucket
  #   endpoint: oss-cn-hangzhou.aliyuncs.com
  #   access_key: your-access-key
  #   secret_key: your-secret-key
  # s3:
  #   bucket: your-bucket
  #   endpoint: s3.amazonaws.com
  #   region: us-east-1
  # cos:
  #   bucket: your-bucket-1250000000
  #   region: ap-guangzhou
  # obs:
  #   bucket: your-bucket
  #   endpoint: obs.myhwclouds.com

# 日志配置
logging:
  level: info             # debug / info / warn / error
  format: json            # json / text
  output: stdout          # stdout / stderr / 文件路径

# 审计日志（记录管理操作）
audit:
  enabled: true
  log_all_requests: false

# 多站点配置（SaaS 多租户）
multi_site:
  enabled: true
  default_site_id: ""

# 特性开关
features:
  version_history: true
  api_tokens: true
  media_library: true
