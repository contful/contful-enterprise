# Contful Open API 配置
# 文档: https://docs.contful.dev/open-api/configuration

# 服务配置
server:
  port: "8081"              # 服务端口
  mode: "release"           # 运行模式: release/debug
  read_timeout: 60          # 读超时(秒)
  write_timeout: 60          # 写超时(秒)
  shutdown_timeout: 30      # 优雅关闭超时(秒)

# 数据库配置 (PostgreSQL)
database:
  host: "localhost"
  port: 5432
  user: "contful"
  password: ""              # 推荐使用环境变量
  name: "contful"
  ssl_mode: "disable"       # disable/require/verify-ca/verify-full
  max_open_conns: 100       # 最大连接数
  max_idle_conns: 10        # 空闲连接数
  conn_max_lifetime: 3600   # 连接最大存活时间(秒)

# Redis 配置
redis:
  host: "localhost"
  port: 6379
  password: ""              # 推荐使用环境变量
  db: 0                     # 数据库编号
  pool_size: 100            # 连接池大小

# 文件存储配置
storage:
  upload_dir: "./uploads"    # 上传文件存储目录
  max_upload_size_mb: 10    # 最大上传文件大小(MB)
  allowed_extensions:       # 允许的文件扩展名
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"

# 日志配置
logging:
  level: "info"             # debug/info/warn/error
  format: "json"            # json/console
  output: "stdout"         # stdout/stderr 或文件路径

# 限流配置
rate_limit:
  enabled: true             # 是否启用限流
  requests_per_minute: 100  # 每个 Token 每分钟请求次数
